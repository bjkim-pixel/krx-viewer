name: KRX Daily Data Fetch

on:
  schedule:
    # 매일 장 마감 후 오후 4시 30분 (KST = UTC+9, so UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    # 수동 실행 허용 (테스트용)
    inputs:
      target_date:
        description: '조회 날짜 (YYYYMMDD, 비워두면 오늘)'
        required: false
        default: ''

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests pandas openpyxl

      - name: KIS 데이터 수집 실행
        env:
          KIS_APP_KEY:    ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TARGET_DATE:    ${{ github.event.inputs.target_date }}
        run: python scripts/fetch_kis_data.py

      - name: 생성된 데이터 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 변경사항 있을 때만 커밋
          git diff --cached --quiet || git commit -m "📊 KIS 데이터 자동 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
