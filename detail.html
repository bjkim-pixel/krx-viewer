<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>종목 상세</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070a0f;--s1:#0d1117;--s2:#131a24;--border:#1a2535;--accent:#00d68f;--blue:#1a8fff;--warn:#ff5757;--orange:#ff9500;--purple:#b464ff;--text:#dde4f0;--muted:#3a4f6a;--dim:#7a90aa;--up:#00d68f;--down:#ff4466;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

/* 헤더 */
header{background:rgba(7,10,15,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.back{background:none;border:1px solid var(--border);border-radius:7px;color:var(--dim);font-size:12px;padding:5px 10px;cursor:pointer;font-family:var(--mono);white-space:nowrap}
.hdr-main{flex:1;min-width:0}
.hdr-name{font-size:16px;font-weight:700}
.hdr-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.hdr-price{text-align:right;flex-shrink:0}
.hdr-close{font-size:18px;font-weight:700;font-family:var(--mono)}
.hdr-rate{font-size:11px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:4px;margin-top:3px;display:inline-block}

/* 태그 */
.tag-row{padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.tag{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:4px}
.t-kospi{background:rgba(26,143,255,.15);color:var(--blue)}
.t-kosdaq{background:rgba(0,214,143,.12);color:var(--accent)}
.t-other{background:rgba(58,79,106,.2);color:var(--dim)}
.t-52h{background:rgba(255,149,0,.15);color:var(--orange);border:1px solid rgba(255,149,0,.3)}
.t-allh{background:rgba(255,87,87,.15);color:var(--warn);border:1px solid rgba(255,87,87,.3)}

.content{padding:14px 16px 80px}

/* 섹션 헤더 */
.sec{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin:18px 0 9px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* 기본지표 그리드 */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ic{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.ic-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:4px}
.ic-val{font-size:13px;font-weight:600;font-family:var(--mono)}

/* 투자자 수급 요약 (마켓레이더 이미지3 스타일) */
.supply-wrap{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.supply-row{display:grid;grid-template-columns:50px 1fr 1fr 1fr;padding:8px 12px;border-bottom:1px solid var(--border);align-items:center;gap:6px}
.supply-row:last-child{border-bottom:none}
.supply-period{font-size:10px;color:var(--muted);font-family:var(--mono)}
.supply-val{font-size:12px;font-family:var(--mono);font-weight:600;text-align:right}
.supply-hdr{background:var(--s2);padding:6px 12px}
.supply-hdr .supply-period{color:var(--dim)}
.supply-hdr .supply-val{font-size:9px;color:var(--dim);font-weight:400}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--dim)}
.bup{background:rgba(0,214,143,.12)}.bdown{background:rgba(255,68,102,.12)}.bflat{background:rgba(58,79,106,.2)}

/* 종목 정보 */
.info-list{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:11px;color:var(--muted)}
.info-val{font-size:11px;font-family:var(--mono);font-weight:500;text-align:right}

/* 일별 수급 테이블 */
.daily-tbl{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.dt-hdr{display:grid;grid-template-columns:46px 54px 70px 70px 70px 54px;padding:7px 8px;background:var(--s2);border-bottom:1px solid var(--border)}
.dt-th{font-size:9px;color:var(--muted);font-family:var(--mono);text-align:center}
.dt-th:first-child{text-align:left}
.dt-row{display:grid;grid-template-columns:46px 54px 70px 70px 70px 54px;padding:6px 8px;border-bottom:1px solid rgba(26,37,53,.7);align-items:center}
.dt-row:last-child{border-bottom:none}
.dt-td{font-size:10px;font-family:var(--mono);text-align:center}
.dt-td:first-child{text-align:left;color:var(--dim)}

/* Phase 뱃지 */
.phase-badge{display:inline-block;font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:3px;font-weight:600}
.ph-golden{background:rgba(255,200,0,.15);color:#ffc800;border:1px solid rgba(255,200,0,.3)}
.ph-p2{background:rgba(0,214,143,.12);color:var(--accent);border:1px solid rgba(0,214,143,.25)}
.ph-p1{background:rgba(26,143,255,.12);color:var(--blue);border:1px solid rgba(26,143,255,.25)}
.ph-p3{background:rgba(255,68,102,.12);color:var(--down);border:1px solid rgba(255,68,102,.25)}
.ph-{background:rgba(58,79,106,.15);color:var(--dim)}
</style>
</head>
<body>
<header>
  <button class="back" onclick="history.back()">← 목록</button>
  <div class="hdr-main">
    <div class="hdr-name" id="h-name">—</div>
    <div class="hdr-sub" id="h-sub">—</div>
  </div>
  <div class="hdr-price">
    <div class="hdr-close" id="h-close">—</div>
    <span class="hdr-rate" id="h-rate">—</span>
  </div>
</header>
<div class="tag-row" id="tag-banner"></div>

<div class="content">

  <div class="sec">기본 지표</div>
  <div class="info-grid" id="basic-grid"></div>

  <div class="sec">투자자별 수급  <span style="font-size:9px;color:var(--muted);font-family:var(--mono)">(외국인 · 기관합계 · 개인)</span></div>
  <div class="supply-wrap">
    <div class="supply-row supply-hdr">
      <div class="supply-period"></div>
      <div class="supply-val">외국인</div>
      <div class="supply-val">기관합계</div>
      <div class="supply-val">개인</div>
    </div>
    <div class="supply-row" id="sup-today"><div class="supply-period">오늘</div></div>
    <div class="supply-row" id="sup-week"><div class="supply-period">1주일</div></div>
    <div class="supply-row" id="sup-month"><div class="supply-period">1개월</div></div>
  </div>

  <div class="sec">종목 정보</div>
  <div class="info-list" id="info-list"></div>

  <div class="sec">일별 수급 · 매직지수 <span style="font-size:9px;color:var(--muted);font-family:var(--mono)">(최근 15일)</span></div>
  <div class="daily-tbl">
    <div class="dt-hdr">
      <div class="dt-th">날짜</div>
      <div class="dt-th">종가</div>
      <div class="dt-th">외국인</div>
      <div class="dt-th">기관합계</div>
      <div class="dt-th">개인</div>
      <div class="dt-th">Phase</div>
    </div>
    <div id="daily-body"></div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let s = null;

document.addEventListener('DOMContentLoaded', () => {
  const raw = sessionStorage.getItem('detail_stock');
  if (!raw) { history.back(); return; }
  s = JSON.parse(raw);
  renderHeader();
  renderBasic();
  renderSupply();
  renderInfo();
  renderDaily();
});

function renderHeader() {
  const rc = cls(s.rate||0), rbc = bcls(s.rate||0);
  const name = s.name || s.code || '—';
  const sub = [s.code, s.market, s.dept].filter(Boolean).join(' · ');
  $('h-name').textContent = name;
  $('h-sub').textContent  = sub;
  $('h-close').textContent = (s.close||0).toLocaleString();
  $('h-close').className   = 'hdr-close ' + rc;
  const sign = (s.rate||0) > 0 ? '+' : '';
  $('h-rate').textContent  = `${sign}${(s.rate||0).toFixed(2)}% (${(s.diff||0)>0?'+':''}${(s.diff||0).toLocaleString()})`;
  $('h-rate').className    = `hdr-rate ${rbc} ${rc}`;

  const mTag = s.market==='KOSPI'?'t-kospi':s.market==='KOSDAQ'?'t-kosdaq':'t-other';
  $('tag-banner').innerHTML =
    `<span class="tag ${mTag}">${s.market||'—'}</span>`
    +(s.isAllH?'<span class="tag t-allh">역대신고가🔥</span>':'')
    +(s.is52h ?'<span class="tag t-52h">52주신고가★</span>':'')
    +(s.dept  ?`<span class="tag" style="background:rgba(58,79,106,.2);color:var(--dim)">${s.dept}</span>`:'');
}

function renderBasic() {
  const capStr = s.cap > 0 ? Math.round(s.cap/1e8).toLocaleString()+'억' : '—';
  const items = [
    ['시가총액', capStr, ''],
    ['등락률', (s.rate>0?'+':'')+(s.rate||0).toFixed(2)+'%', cls(s.rate||0)],
    ['종가', (s.close||0).toLocaleString(), cls(s.rate||0)],
  ];
  if (s.P != null) items.push(['P 무게수(%)', (s.P||0).toFixed(2)+'%', 'color:var(--accent)']);
  if (s.Q != null) items.push(['Q 대금비중', (s.Q||0).toFixed(5), 'color:var(--blue)']);
  if (s.volume)    items.push(['거래량', (s.volume||0).toLocaleString(), '']);

  $('basic-grid').innerHTML = items.map(([l,v,c]) =>
    `<div class="ic"><div class="ic-lbl">${l}</div><div class="ic-val" class="${c}" style="${c.startsWith('color') ? c : ''}">${v}</div></div>`
  ).join('');
}

function renderSupply() {
  const inv = s._inv;
  if (!inv) {
    ['sup-today','sup-week','sup-month'].forEach(id => {
      $(id).innerHTML += '<div class="supply-val flat">—</div><div class="supply-val flat">—</div><div class="supply-val flat">—</div>';
    });
    return;
  }
  function fillRow(elId, data) {
    const el = $(elId);
    ['frgn','inst','indiv'].forEach(k => {
      const v = data[k] ?? null;
      const vc = v === null ? 'flat' : v > 0 ? 'up' : v < 0 ? 'down' : 'flat';
      el.innerHTML += `<div class="supply-val ${vc}">${v === null ? '—' : (v>0?'+':'')+fmt억(v)}</div>`;
    });
  }
  fillRow('sup-today', inv.today || {});
  fillRow('sup-week',  inv.week  || {});
  fillRow('sup-month', inv.month || {});
}

function renderInfo() {
  const rows = [];
  if (s.market)   rows.push(['시장',    s.market]);
  if (s.dept)     rows.push(['업종',    s.dept]);
  if (s.cap > 0)  rows.push(['시가총액', Math.round(s.cap/1e8).toLocaleString()+'억']);
  if (s.volume)   rows.push(['거래량',  s.volume.toLocaleString()]);
  if (s.amount)   rows.push(['거래대금', Math.round((s.amount||0)/1e8).toLocaleString()+'억']);
  if (s.f_consec > 0) rows.push(['외인 연속매수', s.f_consec+'일']);
  if (s.i_consec > 0) rows.push(['기관 연속매수', s.i_consec+'일']);
  if (s.nh_flag)  rows.push(['신고가',  s.nh_flag]);

  if (!rows.length) { $('info-list').style.display='none'; return; }
  $('info-list').innerHTML = rows.map(([k,v]) =>
    `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`
  ).join('');
}

function renderDaily() {
  const daily = s._inv?.daily;
  if (!daily?.length) {
    $('daily-body').innerHTML = '<div style="padding:16px;text-align:center;font-size:11px;color:var(--muted)">일별 데이터 없음</div>';
    return;
  }
  // 마켓레이더 방식: 최신일이 상단 (daily는 이미 오래된→최신 순이므로 reverse)
  const rows = [...daily].reverse();
  $('daily-body').innerHTML = rows.map(r => {
    const dt = r.date || '';
    const dtFmt = dt.length >= 8 ? dt.slice(4,6)+'/'+dt.slice(6,8) : '—';
    const phKey = r.phase_key || '';
    const phLabel = r.phase || '-';
    const phCls = 'ph-'+phKey;
    const rc = cls(r.rate||0);
    return `<div class="dt-row">
      <div class="dt-td">${dtFmt}</div>
      <div class="dt-td"><span class="${rc}">${(r.close||0).toLocaleString()}</span></div>
      <div class="dt-td"><span class="${cls(r.frgn||0)}">${r.frgn != null ? (r.frgn>0?'+':'')+fmt억(r.frgn) : '—'}</span></div>
      <div class="dt-td"><span class="${cls(r.inst||0)}">${r.inst != null ? (r.inst>0?'+':'')+fmt억(r.inst) : '—'}</span></div>
      <div class="dt-td"><span class="${cls(r.indiv||0)}">${r.indiv != null ? (r.indiv>0?'+':'')+fmt억(r.indiv) : '—'}</span></div>
      <div class="dt-td"><span class="phase-badge ${phCls}">${phLabel}</span></div>
    </div>`;
  }).join('');
}

const cls  = v => v > 0 ? 'up'  : v < 0 ? 'down'  : 'flat';
const bcls = v => v > 0 ? 'bup' : v < 0 ? 'bdown' : 'bflat';
function fmt억(v) {
  if (v === null || v === undefined) return '—';
  const a = Math.abs(v), pre = v < 0 ? '-' : '';
  if (a >= 1e12) return pre + (a/1e12).toFixed(1) + '조';
  if (a >= 1e8)  return pre + (a/1e8).toFixed(1)  + '억';
  if (a >= 1e4)  return pre + (a/1e4).toFixed(0)  + '만';
  return v.toLocaleString();
}
</script>
</body>
</html>
